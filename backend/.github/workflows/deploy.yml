name: Deploy Backend to Hetzner

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (password auth)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 49.12.241.17
          username: root
          password: ${{ secrets.HETZNER_SSH_PASSWORD }}
          script: |
            cd /opt/mithraai && git pull origin master
            cd /opt/mithraai/backend && docker compose down && docker compose up -d --build
            sleep 5
            curl -s http://localhost:8001/api/health
            echo "✅ Deployed at $(date)"
