services:
  api:
    build: .
    ports:
      # Host 8001 — nginx proxies api.mithraai.in to localhost:8001
      # (host port 8000 is occupied by an unrelated process)
      - "8001:8000"
    env_file:
      - .env
    environment:
      - FRONTEND_URL=https://mithraai.in
    restart: unless-stopped
    volumes:
      # DATABASE_URL points at /app/data/mithra.db — this mount is what makes
      # user data survive container rebuilds. Do not remove.
      - ./data:/app/data
